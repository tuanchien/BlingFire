name: Build BlingFire

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  # Builds for win-x64 (native) and win-arm64 (MSVC amd64→arm64 cross-compile).
  build-windows:
    name: Build (Windows ${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            msvc_arch: amd64
            can_test: true
            runner: windows-latest
          - rid: win-arm64
            msvc_arch: amd64_arm64
            can_test: false
    steps:
      - uses: actions/checkout@v4

      # Set up the MSVC developer environment so cl.exe / link.exe are on PATH
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure CMake
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Copy native library for tests
        if: matrix.can_test
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse build -Filter blingfiretokdll.dll | Select-Object -First 1
          New-Item -ItemType Directory -Force nuget\lib\runtimes\win-x64\native | Out-Null
          Copy-Item $dll.FullName nuget\lib\runtimes\win-x64\native\blingfiretokdll.dll

      - name: Set up .NET
        if: matrix.can_test
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run tests
        if: matrix.can_test
        run: dotnet test bindings/dotnet/BlingFireDotNet.Tests/BlingFireDotNet.Tests.csproj --configuration Release --framework net10.0 -p:TargetFrameworks=net10.0 --logger "console;verbosity=normal"

      - name: Stage native library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          $dll = Get-ChildItem -Recurse build -Filter blingfiretokdll.dll | Select-Object -First 1
          Copy-Item $dll.FullName staging\blingfiretokdll.dll

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/blingfiretokdll.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-${{ matrix.rid }}
          path: |
            build/**/*.dll
            build/**/*.lib
            build/**/*.exe

  # ── Linux ──────────────────────────────────────────────────────────────────
  # Builds for linux-x64 and linux-arm64 using native runners.
  build-linux:
    name: Build (Linux ${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            can_test: true
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            can_test: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Copy native library for tests
        if: matrix.can_test
        run: |
          mkdir -p nuget/lib/runtimes/linux-x64/native
          cp "$(find build -name 'libblingfiretokdll.so' | head -1)" nuget/lib/runtimes/linux-x64/native/libblingfiretokdll.so

      - name: Set up .NET
        if: matrix.can_test
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run tests
        if: matrix.can_test
        run: dotnet test bindings/dotnet/BlingFireDotNet.Tests/BlingFireDotNet.Tests.csproj --configuration Release --framework net10.0 -p:TargetFrameworks=net10.0 --logger "console;verbosity=normal"

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfiretokdll.so' | head -1)" staging/libblingfiretokdll.so

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/libblingfiretokdll.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-${{ matrix.rid }}
          path: |
            build/**/*.so
            build/**/*.a

  # ── macOS ──────────────────────────────────────────────────────────────────
  # Builds for osx-x64 and osx-arm64 both on macos-latest (Apple Silicon).
  # osx-x64 cross-compiles for x86_64 via CMAKE_OSX_ARCHITECTURES.
  build-macos:
    name: Build (macOS ${{ matrix.rid }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-x64
            arch: x86_64
            can_test: false
          - rid: osx-arm64
            arch: arm64
            can_test: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure CMake
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}

      - name: Build
        run: cmake --build build

      - name: Copy native library for tests
        if: matrix.can_test
        run: |
          mkdir -p nuget/lib/runtimes/osx-x64/native
          cp "$(find build -name 'libblingfiretokdll.dylib' | head -1)" nuget/lib/runtimes/osx-x64/native/libblingfiretokdll.dylib

      - name: Set up .NET
        if: matrix.can_test
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run tests
        if: matrix.can_test
        run: dotnet test bindings/dotnet/BlingFireDotNet.Tests/BlingFireDotNet.Tests.csproj --configuration Release --framework net10.0 -p:TargetFrameworks=net10.0 --logger "console;verbosity=normal"

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfiretokdll.dylib' | head -1)" staging/libblingfiretokdll.dylib

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/libblingfiretokdll.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-${{ matrix.rid }}
          path: |
            build/**/*.dylib
            build/**/*.a

  # ── Mac Catalyst ───────────────────────────────────────────────────────────
  # Builds the shared dylib targeting the Mac Catalyst ABI (macabi).  Uses the
  # macOS SDK with a -target …-macabi compiler triple so the dylib can be
  # consumed by iOS-derived apps running on macOS via Mac Catalyst.
  # Both variants run on macos-latest (Apple Silicon); x64 cross-compiles.
  build-maccatalyst:
    name: Build (Mac Catalyst ${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: maccatalyst-x64
            arch: x86_64
            runner: macos-latest
          - rid: maccatalyst-arm64
            arch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure CMake
        run: |
          SDK=$(xcrun --sdk macosx --show-sdk-path)
          cmake -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            "-DCMAKE_C_FLAGS=-target ${{ matrix.arch }}-apple-ios14.0-macabi" \
            "-DCMAKE_CXX_FLAGS=-target ${{ matrix.arch }}-apple-ios14.0-macabi" \
            "-DCMAKE_SHARED_LINKER_FLAGS=-target ${{ matrix.arch }}-apple-ios14.0-macabi"

      - name: Build
        run: cmake --build build

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfiretokdll.dylib' | head -1)" staging/libblingfiretokdll.dylib

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/libblingfiretokdll.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-${{ matrix.rid }}
          path: |
            build/**/*.dylib
            build/**/*.a

  # ── iOS ────────────────────────────────────────────────────────────────────
  # Builds static libraries only (shared libs are guarded by IF(NOT IOS) in
  # CMakeLists.txt).  Code signing is disabled so the build works without
  # provisioning profiles in CI.
  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build -G "Xcode" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DIOS=ON

      - name: Build
        run: |
          cmake --build build --config Release \
            -- -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfire.a' | head -1)" staging/libblingfire.a

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-ios-arm64
          path: staging/libblingfire.a

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-ios
          path: build/**/*.a

  # ── iOS Simulator ──────────────────────────────────────────────────────────
  # Builds static libraries targeting the iOS Simulator SDK.  Two architectures
  # are built in parallel: arm64 (Apple Silicon host) and x86_64 (Intel host).
  # Shared libs are still skipped via IF(NOT IOS) in CMakeLists.txt because
  # -DIOS=ON is passed for both device and simulator builds.
  build-iossimulator:
    name: Build (iOS Simulator ${{ matrix.rid }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: iossimulator-arm64
            arch: arm64
          - rid: iossimulator-x64
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build -G "Xcode" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DIOS=ON

      - name: Build
        run: |
          cmake --build build --config Release \
            -- -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfire.a' | head -1)" staging/libblingfire.a

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/libblingfire.a

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-${{ matrix.rid }}
          path: build/**/*.a

  # ── Android ────────────────────────────────────────────────────────────────
  # Builds against API 28+ as required by CMakeLists.txt (iconv in bionic libc
  # requires API 28).  Three ABIs are built in parallel via a matrix.
  build-android:
    name: Build (Android ${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rid: android-arm64
          - abi: armeabi-v7a
            rid: android-arm
          - abi: x86_64
            rid: android-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Stage native library
        run: |
          mkdir -p staging
          cp "$(find build -name 'libblingfiretokdll.so' | head -1)" staging/libblingfiretokdll.so

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staging/libblingfiretokdll.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blingfire-android-${{ matrix.abi }}
          path: |
            build/**/*.so
            build/**/*.a

  # ── NuGet ──────────────────────────────────────────────────────────────────
  # Downloads the freshly compiled native libraries from each platform build,
  # overwrites the precompiled stubs in nuget/lib/runtimes/*/native/, and packs
  # the NuGet package.
  pack-nuget:
    name: Pack NuGet
    runs-on: macos-latest
    needs: [build-windows, build-linux, build-macos, build-maccatalyst, build-ios, build-iossimulator, build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Download win-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/win-x64/native

      - name: Download win-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-win-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/win-arm64/native

      - name: Download linux-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/linux-x64/native

      - name: Download linux-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/linux-arm64/native

      - name: Download osx-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/osx-x64/native

      - name: Download osx-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/osx-arm64/native

      - name: Download ios-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-ios-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/ios-arm64/native

      - name: Download iossimulator-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-iossimulator-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/iossimulator-arm64/native

      - name: Download iossimulator-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-iossimulator-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/iossimulator-x64/native

      - name: Download maccatalyst-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-maccatalyst-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/maccatalyst-x64/native

      - name: Download maccatalyst-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-maccatalyst-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/maccatalyst-arm64/native

      - name: Download android-arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-android-arm64
          path: bindings/dotnet/BlingFireDotNet/runtimes/android-arm64/native

      - name: Download android-arm native library
        uses: actions/download-artifact@v4
        with:
          name: native-android-arm
          path: bindings/dotnet/BlingFireDotNet/runtimes/android-arm/native

      - name: Download android-x64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-android-x64
          path: bindings/dotnet/BlingFireDotNet/runtimes/android-x64/native

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore .NET workloads
        run: dotnet workload restore bindings/dotnet/BlingFireDotNet/BlingFireDotNet.csproj

      - name: Pack NuGet
        run: dotnet pack bindings/dotnet/BlingFireDotNet/BlingFireDotNet.csproj --output nuget-output

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nuget-output/*.nupkg
